name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Bootstrap
        run: pnpm bootstrap

      - name: Doctor
        run: pnpm doctor

      - name: Install Playwright Linux dependencies
        run: pnpm --filter @alphomi/driver exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Smoke
        run: SKIP_WORKSPACE_TESTS=1 pnpm smoke

      - name: Build
        run: pnpm build
